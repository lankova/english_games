<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Ensures proper display on mobile devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Games</title>
    <!-- Favicon (website icon) -->
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">
    <!-- Styles -->
    <link rel="stylesheet" href="{{ url_for('static', filename='global.css') }}">
</head>

<body>
    <button id="theme-toggle" class="theme-toggle" title="Switch theme">🌓</button>

    <div class="main-card"> <!-- Light card with rounded corners — purely decorative -->
        <div class="main-content">
            <!-- Main headline -->
            <p class="main-title">Play games &<br>practice English</p>

            <!-- Choose a game -->
            <p class="subtitle">Choose a game:</p>

            <!-- Container for game game links — uses flexbox for layout -->
            <div class="links-container">
                <!-- Game links: actual game pages will go here -->
                <a href="{{ url_for('game1_rules') }}">
                    Describe & Guess
                    <span class="game-description">A word-guessing adventure<br>
                    2+ players
                    </span>
                </a>

                <a href="{{ url_for('game2_rules') }}">
                    Spy in Ithaca
                    <span class="game-description">Ask questions. Trust no one. Find the spy.<br>
                    3+ players
                    </span>
                </a>


                <!-- This game might be created later
                <a href="#">
                    The Unknown Traveller
                    <span class="game-description">A game of secrets and deduction<br>
                    3+ players
                    </span>
                </a>
                !-->

            </div>
        </div> <!-- End of main content div -->

        <!-- Decorative cat image — adds a friendly touch -->
        <div class="cat-wrapper">
            <img class="cat-image" src="{{ url_for('static', filename='common/images/orange_cat.png') }}" alt="Orange cat">
        </div>

        <!-- Contact section: user can reach out with questions or suggestions -->
        <div class="contactme">
            <p class="contactme-questions">Any questions or suggestions?</p>
            <div class="contactme-links">
                <a href="mailto:lankova_lidiya@mail.ru">📧 lankova_lidiya@mail.ru</a>
                <a href="https://github.com/Lidia9696/english_games" target="_blank" rel="noopener">💻 github.com/Lidia9696/english_games</a>
            </div>
        </div>
    </div> <!-- End of main card div -->

</body>

<script>
    // Theme toggle
    const themeToggle = document.getElementById('theme-toggle');
    const savedTheme = localStorage.getItem('theme');

    if (savedTheme === 'light') {
        document.body.classList.add('light-theme');
    }

    themeToggle.addEventListener('click', () => {
        document.body.classList.toggle('light-theme');
        const isLight = document.body.classList.contains('light-theme');
        localStorage.setItem('theme', isLight ? 'light' : 'dark');
    });
</script>

</html>
